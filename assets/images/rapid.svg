<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" rx="18" fill="#2980B9"/>
  <!-- Rapid: rabbit/running — clock with a dash of speed; use a clock + swoosh -->
  <!-- clock face -->
  <circle cx="40" cy="42" r="22" fill="none" stroke="#FFFFFF" stroke-width="5"/>
  <!-- clock hands showing fast time -->
  <line x1="40" y1="42" x2="40" y2="26" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <line x1="40" y1="42" x2="52" y2="36" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <!-- crown/stem of clock -->
  <rect x="36" y="14" width="8" height="6" rx="2" fill="#FFFFFF"/>
  <!-- speed notch top left -->
  <line x1="12" y1="18" x2="26" y2="18" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="16" y1="26" x2="26" y2="26" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
