<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <rect width="80" height="80" rx="18" fill="#CC2200"/>
  <!-- Bullet: literal bullet/projectile shape — speed lines + bullet -->
  <!-- speed lines left -->
  <line x1="8" y1="32" x2="28" y2="32" stroke="#FF6644" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="8" y1="40" x2="24" y2="40" stroke="#FF6644" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="8" y1="48" x2="28" y2="48" stroke="#FF6644" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- bullet body -->
  <rect x="28" y="28" width="26" height="24" rx="4" fill="#FFFFFF"/>
  <!-- bullet tip (pointed) -->
  <polygon points="54,28 54,52 70,40" fill="#FFFFFF"/>
</svg>
